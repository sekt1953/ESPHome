# Author: Pascal Parent
# Company: Home Automator (ZA)
# Web: https://www.youtube.com/@homeautomatorza
# Version: 1.0.0
# Licence: CCO 1.0 https://creativecommons.org/publicdomain/zero/1.0/
# ------------------------------------------------------------------------------
# Notes:
#     - Work in Progress --
#     - To flash with a serial programmer bridge IO0 and GND
# ------------------------------------------------------------------------------
# Referance: https://docs.espressif.com/projects/arduino-esp32/en/latest/boards/ESP32-C3-DevKitM-1.html
# Spec: 
#     - ESP32-D0WD V3 Dual core 
#     - 2.4 GHz Wi­Fi 4 (802.11 b/g/n) and Bluetooth 4.2 
#     - 4 MB flash
#     - 520KB SRAM
#     - 16 KB SRAM in RTC
#     - 12-bit SAR ADC up to 18 channels
#     - Two 8-bit DAC
#     - 10 touch sensors
#     - Four SPI interfaces
#     - Two I2S interfaces
#     - Two I2C interfaces
#     - Three UART interfaces
#     - One host (SD/eMMC/SDIO)
#     - One slave (SDIO/SPI)
#     - Pulse count controller
#     - Ethernet MAC interface with dedicated DMA and IEEE 1588 support
#     - TWAI®, compatible with ISO 11898-1 (CAN Specification 2.0)
#     - RMT (TX/RX)
#     - Motor PWM
#     - LED PWM up to 16 channels
# ------------------------------------------------------------------------------
# WARNING:
# This code carries a "It works on my setup" disclaimer!
# Meaning that it works on my setup but it may not work on yours.
# Use at your own risks!
################################################################################
esp32:
  board: wt32-eth01
  flash_size: 4MB
  framework:
    type: esp-idf
    version: latest

# Status led
status_led:
  id: ${device_internal_name}_status_led
  pin:
    number: GPIO2
    inverted: false

# I2C settings
i2c:
  id: ${device_internal_name}_i2c
  sda: GPIO33
  scl: GPIO32
  scan: true

# UART
uart:
  id: ${device_internal_name}_uart_bus0
  tx_pin: GPIO17
  rx_pin: GPIO5
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

# SPI
# External CS => GPIO12
spi:
  id: ${device_internal_name}_spi_bus0
  clk_pin: GPIO14
  mosi_pin: GPIO15
  miso_pin: GPIO4
  interface: hardware

# Sensors
sensor:
  # Internal Temperature Sensor
  - platform: internal_temperature
    id: ${device_internal_name}_internal_temperature
    name: Internal Temperature 
    icon: mdi:temperature-celsius
    unit_of_measurement: °C
    device_class: temperature
    update_interval: ${device_sampling_time}
    disabled_by_default: true
  
  - platform: template
    id: ${device_internal_name}_internal_temperature_f
    name: Internal Temperature (F)
    icon: mdi:temperature-fahrenheit
    unit_of_measurement: °F
    lambda: return id(${device_internal_name}_internal_temperature).state * 9/5+32;
    device_class: temperature
    update_interval: ${device_sampling_time}
    entity_category: diagnostic
    disabled_by_default: true